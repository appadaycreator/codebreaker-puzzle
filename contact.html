<div class="container">

        <h1>お問い合わせ</h1>
        <p>コードブレイカーに関するご意見・ご要望・不具合報告をお送りいただけます。通常2〜5営業日以内にご回答いたします。</p>

        <div id="success" class="success">✅ お問い合わせを受け付けました。ご連絡ありがとうございます。</div>

        <form id="contactForm" action="https://formspree.io/f/xdkodpqg" method="POST">
            <input type="hidden" name="_subject" value="[コードブレイカー] お問い合わせ">
            <input type="hidden" name="_language" value="ja">
            <div class="form-group">
                <label for="name">お名前 <span style="color:#ef4444">*</span></label>
                <input type="text" id="name" name="name" required placeholder="山田 太郎">
            </div>
            <div class="form-group">
                <label for="email">メールアドレス <span style="color:#ef4444">*</span></label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="category">お問い合わせ種別</label>
                <select id="category" name="category">
                    <option value="bug">不具合・エラー報告</option>
                    <option value="feature">機能改善のご要望</option>
                    <option value="question">使い方のご質問</option>
                    <option value="other">その他</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">内容 <span style="color:#ef4444">*</span></label>
                <textarea id="message" name="message" required placeholder="具体的な内容をご記入ください（使用デバイス、ブラウザ、発生状況等）"></textarea>
            </div>
            <button type="submit" class="btn">送信する</button>
            <p class="note">※個人情報は返答のためのみ使用し、第三者に提供しません。<br>
            直接メール: <a href="mailto:tokunaga.g@gmail.com">tokunaga.g@gmail.com</a></p>
        </form>

        <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            btn.textContent = '送信中...';
            btn.disabled = true;
            try {
                const res = await fetch(this.action, {
                    method: 'POST',
                    body: new FormData(this),
                    headers: {'Accept': 'application/json'}
                });
                if (res.ok) {
                    this.style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                } else {
                    btn.textContent = '送信する';
                    btn.disabled = false;
                    alert('送信に失敗しました。直接メールでご連絡ください。');
                }
            } catch(err) {
                btn.textContent = '送信する';
                btn.disabled = false;
            }
        });
        </script>
    </div>
</div>
